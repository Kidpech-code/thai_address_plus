name: thai_address_plus
description: >-
  Flutter SDK for Thailand Geographic API with caching &
  a debounced address search widget.
version: 0.1.2
homepage: https://github.com/Kidpech-code/thai_address_plus
repository: https://github.com/Kidpech-code/thai_address_plus
issue_tracker: https://github.com/Kidpech-code/thai_address_plus/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.2
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Optional: regenerate models from docs/geo/swagger.yaml
  # swagger_parser: ^1.27.0
  # build_runner: ^2.4.13

